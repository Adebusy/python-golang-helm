apiVersion: v1
kind: Service
metadata:
  labels:
    app: "{{ .Values.image.repository }}"
  name: "{{ .Values.image.repository }}-svc"
  namespace: "{{ .Values.appNamespace }}-ns"
spec:
  selector:
    app: "{{ .Values.image.repository }}"
  ports:
  - name: "{{ .Values.image.repository }}-port"
    protocol: TCP
    port: {{ .Values.port }}
    targetPort: {{ .Values.targetPort }}
